# A string used to distinguish different Supabase projects on the same local machine.
project_id = "stockflow-vnext"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://stockflow.grandigix.com/"
additional_redirect_urls = [
  "https://stockflow-*.vercel.app/**",
  "https://stockflow-ruby.vercel.app/*",
  "https://stockflow.grandigix.com",
  "https://stockflow.grandigix.com/**",
  "https://stockflow.grandigix.com/login",
  "http://localhost:5173/**",
  "https://localhost:5173/**"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_manual_linking = false

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1s"
otp_length = 8
otp_expiry = 3600

[edge_runtime]
enabled = true
inspector_port = 8238

[analytics]
enabled = false
