name: Supabase Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy migrations and Edge Functions
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
      - name: Push database migrations
        run: supabase db push
      - name: Deploy Edge Functions (JWT-protected)
        run: supabase functions deploy
      - name: Deploy public Edge Functions (no JWT verification)
        run: |
          supabase functions deploy login --no-verify-jwt
          supabase functions deploy send-magic-link --no-verify-jwt
          supabase functions deploy lookup-user-by-email --no-verify-jwt
          supabase functions deploy signup --no-verify-jwt
