<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon-mask.svg" color="#0f172a" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <script>
      ;(function () {
        try {
          const stored = localStorage.getItem('stockflow-theme')
          const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          const isDark = stored === 'dark' || (stored !== 'light' && systemDark)
          document.documentElement.classList.toggle('dark', isDark)
        } catch (e) {}
      })()
    </script>
    <link
      rel="preload"
      as="image"
      href="/dashboard-preview-1600.webp"
      type="image/webp"
      media="(min-width: 1024px)"
    />
    <meta
      name="description"
      content="StockFlow — Gestion de stock, caisse et facturation moderne et offline-first"
    />
    <meta property="og:title" content="StockFlow" />
    <meta
      property="og:description"
      content="Gestion de stock, caisse et facturation moderne et offline-first pour les PME."
    />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:type" content="website" />
    <title>StockFlow</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/landing.tsx"></script>
  </body>
</html>
