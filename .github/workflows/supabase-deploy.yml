name: Supabase Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy migrations and Edge Functions
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v2
        with:
          version: 2.107.0
      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"
      - name: Push database migrations
        run: supabase db push
      - name: Deploy Edge Functions (JWT-protected)
        run: |
          for attempt in 1 2 3; do
            echo "Attempt $attempt/3..."
            if supabase functions deploy; then
              exit 0
            fi
            echo "Deploy failed, retrying in 30s..."
            sleep 30
          done
          echo "All retry attempts exhausted."
          exit 1
      - name: Deploy public Edge Functions (no JWT verification)
        run: |
          for fn in login send-magic-link lookup-user-by-email signup; do
            for attempt in 1 2 3; do
              echo "Deploying $fn (attempt $attempt/3)..."
              if supabase functions deploy "$fn" --no-verify-jwt; then
                break
              fi
              echo "Failed to deploy $fn, retrying in 30s..."
              sleep 30
            done
          done
